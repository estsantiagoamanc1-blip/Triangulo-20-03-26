<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Triángulos - DDA y Bresenham</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:20px;
}

.panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

canvas{
border:2px solid #444;
background:white;
}

input{
width:60px;
padding:5px;
margin:3px;
}

button{
padding:10px 15px;
margin-top:10px;
border:none;
background:#1976d2;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#125ea8;
}

#mensaje{
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Visualizador de Triángulos</h2>

<div class="container">

<div class="panel">

<h3>Coordenadas</h3>

<p>Punto A</p>
x <input id="x1"> y <input id="y1">

<p>Punto B</p>
x <input id="x2"> y <input id="y2">

<p>Punto C</p>
x <input id="x3"> y <input id="y3">

<br><br>

<select id="method">
<option value="dda">DDA</option>
<option value="bresenham">Bresenham</option>
</select>

<br><br>

<button onclick="dibujar()">Dibujar</button>
<button onclick="limpiar()">Limpiar</button>

<p id="mensaje"></p>

</div>

<div class="panel">
<canvas id="canvas" width="600" height="600"></canvas>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const inputs = ["x1","y1","x2","y2","x3","y3"].map(id => document.getElementById(id));
const mensaje = document.getElementById("mensaje");
const methodSelect = document.getElementById("method");

const escala = 25;
const origenX = canvas.width / 2;
const origenY = canvas.height / 2;

/* Dibujar punto */
const drawPoint = (x,y,size=3,color="red") => {
ctx.fillStyle = color;
ctx.fillRect(x - size/2, y - size/2, size, size);
};

/* Conversión */
const toCanvas = (x,y) => ({
x: origenX + x*escala,
y: origenY - y*escala
});

/* Grid */
function drawGrid(){
ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#ddd";

for(let x=0; x<=canvas.width; x+=escala){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}

for(let y=0; y<=canvas.height; y+=escala){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}

/* ejes */
ctx.strokeStyle="#000";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(0,origenY);
ctx.lineTo(canvas.width,origenY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(origenX,0);
ctx.lineTo(origenX,canvas.height);
ctx.stroke();

ctx.lineWidth=1;
}

/* DDA */
function drawDDA(x1,y1,x2,y2){
const dx = x2-x1;
const dy = y2-y1;
const steps = Math.max(Math.abs(dx), Math.abs(dy));

const xInc = dx/steps;
const yInc = dy/steps;

let x = x1, y = y1;

for(let i=0;i<=steps;i++){
drawPoint(x,y,3,"blue");
x+=xInc;
y+=yInc;
}
}

/* Bresenham */
function drawBresenham(x1,y1,x2,y2){
let dx=Math.abs(x2-x1);
let dy=Math.abs(y2-y1);
let sx = x1<x2?1:-1;
let sy = y1<y2?1:-1;
let err = dx-dy;

while(true){
drawPoint(x1,y1,3,"green");
if(x1===x2 && y1===y2) break;

let e2 = err*2;

if(e2>-dy){ err-=dy; x1+=sx; }
if(e2<dx){ err+=dx; y1+=sy; }
}
}

/* Línea */
const drawLine = (x1,y1,x2,y2) => {
methodSelect.value === "dda"
? drawDDA(x1,y1,x2,y2)
: drawBresenham(x1,y1,x2,y2);
};

/* Validación triángulo */
const esTriangulo = (x1,y1,x2,y2,x3,y3) =>
(x1*(y2-y3) + x2*(y3-y1) + x3*(y1-y2)) !== 0;

/* Obtener datos */
function getData(){
const values = inputs.map(i => parseFloat(i.value));
if(values.some(isNaN)) return null;

const [x1,y1,x2,y2,x3,y3] = values;
return {x1,y1,x2,y2,x3,y3};
}

/* Dibujar */
function dibujar(){
drawGrid();

const data = getData();

if(!data){
mensaje.textContent = "Ingrese coordenadas válidas";
return;
}

const {x1,y1,x2,y2,x3,y3} = data;

const A = toCanvas(x1,y1);
const B = toCanvas(x2,y2);
const C = toCanvas(x3,y3);

/* puntos */
[A,B,C].forEach(p => drawPoint(p.x,p.y,8));

if(esTriangulo(x1,y1,x2,y2,x3,y3)){
mensaje.textContent = "✔ Forman un triángulo";

drawLine(A.x,A.y,B.x,B.y);
drawLine(B.x,B.y,C.x,C.y);
drawLine(C.x,C.y,A.x,A.y);
}else{
mensaje.textContent = "✖ Son colineales";
}
}

/* limpiar */
function limpiar(){
drawGrid();
mensaje.textContent = "";
}

drawGrid();
</script>

</body>
</html>
