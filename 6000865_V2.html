<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const inputs = ["x1","y1","x2","y2","x3","y3"].map(id => document.getElementById(id));
const mensaje = document.getElementById("mensaje");
const methodSelect = document.getElementById("method");

const escala = 25;
const origenX = canvas.width / 2;
const origenY = canvas.height / 2;

/*========================
UTILIDADES
========================*/
const drawPoint = (x,y,size=3) =>
    ctx.fillRect(x - size/2, y - size/2, size, size);

const toCanvas = (x,y) => ({
    x: origenX + x * escala,
    y: origenY - y * escala
});

const esTriangulo = (x1,y1,x2,y2,x3,y3) =>
    (x1*(y2-y3) + x2*(y3-y1) + x3*(y1-y2)) !== 0;

/*========================
GRID OPTIMIZADO
========================*/
function drawGrid(){

    const {width, height} = canvas;

    ctx.clearRect(0,0,width,height);

    ctx.beginPath();
    ctx.strokeStyle="#ddd";

    for(let i=0;i<=width;i+=escala){
        ctx.moveTo(i,0);
        ctx.lineTo(i,height);
        ctx.moveTo(0,i);
        ctx.lineTo(width,i);
    }

    ctx.stroke();

    // ejes (una sola vez)
    ctx.beginPath();
    ctx.strokeStyle="#000";
    ctx.lineWidth=2;

    ctx.moveTo(0,origenY);
    ctx.lineTo(width,origenY);

    ctx.moveTo(origenX,0);
    ctx.lineTo(origenX,height);

    ctx.stroke();
    ctx.lineWidth=1;
}

/*========================
ALGORITMOS OPTIMIZADOS
========================*/
function drawDDA(x1,y1,x2,y2){
    ctx.fillStyle="blue";

    const dx = x2-x1;
    const dy = y2-y1;
    const steps = Math.max(Math.abs(dx), Math.abs(dy));

    const xInc = dx/steps;
    const yInc = dy/steps;

    let x = x1, y = y1;

    for(let i=0;i<=steps;i++){
        drawPoint(Math.round(x),Math.round(y));
        x+=xInc;
        y+=yInc;
    }
}

function drawBresenham(x1,y1,x2,y2){
    ctx.fillStyle="green";

    let dx=Math.abs(x2-x1), dy=Math.abs(y2-y1);
    let sx = x1<x2?1:-1;
    let sy = y1<y2?1:-1;
    let err = dx-dy;

    while(true){
        drawPoint(x1,y1);
        if(x1===x2 && y1===y2) break;

        const e2 = err*2;

        if(e2>-dy){ err-=dy; x1+=sx; }
        if(e2<dx){ err+=dx; y1+=sy; }
    }
}

const drawLine = (x1,y1,x2,y2) =>
    methodSelect.value === "dda"
        ? drawDDA(x1,y1,x2,y2)
        : drawBresenham(x1,y1,x2,y2);

/*========================
DATOS
========================*/
function getData(){
    const values = inputs.map(i => +i.value);
    return values.some(isNaN)
        ? null
        : (([x1,y1,x2,y2,x3,y3]) => ({x1,y1,x2,y2,x3,y3}))(values);
}

/*========================
RENDER PRINCIPAL
========================*/
function dibujar(){

    drawGrid();

    const data = getData();
    if(!data){
        mensaje.textContent = "Ingrese coordenadas válidas";
        return;
    }

    const {x1,y1,x2,y2,x3,y3} = data;

    const puntos = [
        toCanvas(x1,y1),
        toCanvas(x2,y2),
        toCanvas(x3,y3)
    ];

    // Dibujar puntos
    ctx.fillStyle="red";
    puntos.forEach(p => drawPoint(p.x,p.y,8));

    if(esTriangulo(x1,y1,x2,y2,x3,y3)){

        mensaje.textContent = "✔ Forman un triángulo";

        drawLine(puntos[0].x,puntos[0].y,puntos[1].x,puntos[1].y);
        drawLine(puntos[1].x,puntos[1].y,puntos[2].x,puntos[2].y);
        drawLine(puntos[2].x,puntos[2].y,puntos[0].x,puntos[0].y);

    } else {
        mensaje.textContent = "✖ Son colineales";
    }
}

/*========================
LIMPIAR
========================*/
function limpiar(){
    drawGrid();
    mensaje.textContent="";
}

drawGrid();

// Exponer funciones
window.dibujar = dibujar;
window.limpiar = limpiar;
</script>
